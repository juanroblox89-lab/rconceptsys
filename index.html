<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeOS | Sistema Operativo de Producción</title>
    <meta name="description" content="Plataforma interna de gestión y producción creativa para agencias audiovisuales.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/mobile.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            var div = document.createElement('div');
            div.style.background = 'red';
            div.style.color = 'white';
            div.style.padding = '20px';
            div.style.position = 'fixed';
            div.style.zIndex = '999999';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.fontSize = '20px';
            div.innerHTML = '<h1>CRITICAL ERROR:</h1><p>' + message + '</p><pre>' + (error && error.stack ? error.stack : '') + '</pre>';
            document.body.appendChild(div);
            return true; // prevent default
        };
        window.addEventListener("unhandledrejection", function(event) {
            var div = document.createElement('div');
            div.style.background = 'red';
            div.style.color = 'white';
            div.style.padding = '20px';
            div.style.position = 'fixed';
            div.style.zIndex = '999999';
            div.style.top = '200px';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.fontSize = '20px';
            div.innerHTML = '<h1>UNHANDLED PROMISE REJECTION:</h1><p>' + event.reason + '</p><pre>' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre>';
            document.body.appendChild(div);
        });
    </script>
    <div id="app">
        <!-- Sidebar injected by Sidebar.js component -->

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Dynamic Content View (populated by router.js) -->
            <div id="router-view"></div>
        </main>
    </div>

    <!-- App Logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
