name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛠️ Build Application
        run: npm run build

      - name: 🚀 Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AGENCIA_RCONCEPT }}' > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
          npm install -g firebase-tools
          firebase deploy --only hosting --project agencia-rconcept
